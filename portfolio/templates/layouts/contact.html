<section id="contacto">
    <div class="container">
        <h2 class="section-title">Ponte en Contacto</h2>
        <p class="section-subtitle">Actualmente estoy abierto a nuevas oportunidades, ¡no dudes en contactarme!</p>
        {% if messages %}
            <div class="messages">
                {% for message in messages %}<div class="alert alert-{{ message.tags }}">{{ message }}</div>{% endfor %}
            </div>
        {% endif %}
        <form method="POST"
              action="{% url 'contact' %}#contacto"
              class="contact-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="name" class="form-label">Nombre Completo</label>
                <input type="text"
                       id="name"
                       name="name"
                       class="form-input"
                       placeholder="Tu nombre"
                       required />
            </div>
            <div class="form-group">
                <label for="email" class="form-label">Correo Electrónico</label>
                <input type="email"
                       id="email"
                       name="email"
                       class="form-input"
                       placeholder="tu@ejemplo.com"
                       required />
            </div>
            <div class="form-group">
                <label for="message" class="form-label">Mensaje</label>
                <textarea id="message"
                          name="message"
                          class="form-textarea"
                          placeholder="Tu mensaje"
                          required></textarea>
            </div>
            <button type="submit" class="btn btn-submit btn-filled">Enviar Mensaje</button>
        </form>
    </div>
</section>
