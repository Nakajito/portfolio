{% load i18n %}

<header>
    <nav class="nav-container container">
        <a href="{% url 'home' %}" class="nav-logo">
            <svg viewBox="0 0 24 24">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
            </svg>
        </a>
        <ul class="nav-menu">
            <li>
                <a href="{% url 'home' %}#sobre-mi" class="nav-link">{% trans "Sobre mi" %}</a>
            </li>
            <li>
                <a href="{% url 'home' %}#stack" class="nav-link">{% trans "Habilidades" %}</a>
            </li>
            <li>
                <a href="{% url 'home' %}#proyectos" class="nav-link">{% trans "Proyectos" %}</a>
            </li>
            <li>
                <a href="{% url 'home' %}#contacto" class="nav-link">{% trans "Contacto" %}</a>
            </li>
            <li>
                <a href="{% url 'blog:home' %}" class="nav-link">{% trans "Blog" %}</a>
            </li>
        </ul>
        <div class="nav-actions">
            <form action="{% url 'set_language' %}"
                  method="post"
                  class="locale-switch-form"
                  style="display: inline-block">
                {% csrf_token %}
                <input name="next" type="hidden" value="{{ request.path }}" />
                <select name="language"
                        onchange="this.form.submit()"
                        style="border: none;
                               background: transparent;
                               cursor: pointer;
                               color: var(--text-muted);
                               font-weight: 500">
                    {% get_current_language as LANGUAGE_CODE %}
                    {% get_available_languages as LANGUAGES %}
                    {% for lang in LANGUAGES %}
                        <option value="{{ lang.0 }}"
                                {% if lang.0 == LANGUAGE_CODE %}selected{% endif %}>{{ lang.0 | upper }}</option>
                    {% endfor %}
                </select>
            </form>
            <button class="theme-switch">
                <svg width="18"
                     height="18"
                     viewBox="0 0 24 24"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
            <a href="#contacto" class="btn btn-contact btn-filled">{% trans "Contáctame" %}</a>
        </div>
        <div class="nav-container">
            <div class="nav-actions"></div>
            <button class="hamburger" aria-label="Abrir menú">
                <svg width="24"
                     height="24"
                     viewBox="0 0 24 24"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="2">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </div>
    </nav>
</header>
